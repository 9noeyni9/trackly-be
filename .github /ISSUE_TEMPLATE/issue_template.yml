name: 작업 이슈 템플릿
description: 기능 구현, 버그 수정 등 모든 작업을 위한 이슈 양식입니다.
title: ""
labels: []
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 🍀 어떤 기능인가요?
        추가하려는 기능에 대해 간결하게 설명해주세요.

  - type: textarea
    id: feature
    attributes:
      label: 🍀 어떤 기능인가요?
      description: 추가하려는 기능에 대해 간결하게 설명해주세요.
      placeholder: 예시) Habit 생성 기능 추가, Habit 조회 API 구현 등
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: ✅ 작업 상세 내용
      description: 구현해야 할 핵심 기능, 필요한 API 명세, 예외 처리 등을 작성해주세요.
      placeholder: |
        - [ ] 핵심 기능 1
        - [ ] 핵심 기능 2
        - [ ] 예외 처리 사항
    validations:
      required: true

  - type: textarea
    id: etc
    attributes:
      label: 📌 ETC
      description: 추가적으로 참고해야 할 사항이 있으면 작성해주세요.
      placeholder: 예시) 참고 링크, 관련 이슈 번호 등
